<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hall Of Fame Radar</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
}

.hall-title{
    color:#00ff99;
    font-size:72px;
    margin-top:40px;
    text-shadow:0 0 30px #00ff99;
}

#megaRadar{
    position:relative;
    width:620px;
    height:620px;
    max-width:82vw;
    max-height:82vw;
    margin:60px auto 20px auto;
    border:4px solid #00ff99;
    border-radius:50%;
    overflow:hidden;
    background:radial-gradient(circle, rgba(0,255,153,0.08), black 72%);
    box-shadow:0 0 40px #00ff99, inset 0 0 40px rgba(0,255,153,0.25);
}

.mega-sweep{
    position:absolute;
    width:50%;
    height:4px;
    top:50%;
    left:50%;
    transform-origin:left center;
    background:#00ff99;
    box-shadow:
        0 0 18px #00ff99,
        0 0 45px rgba(0,255,153,0.8);
    animation:megaSpin 4s linear infinite;
    overflow:visible;

.mega-sweep::after{
    content:"";
    position:absolute;
    right:0;
    top:-24px;
    width:260px;
    height:55px;
    background:linear-gradient(
        270deg,
        rgba(0,255,153,0.65),
        rgba(0,255,153,0.25),
        rgba(0,255,153,0)
    );
    filter:blur(16px);
}

@keyframes megaSpin{
    from{ transform:rotate(0deg); }
    to{ transform:rotate(360deg); }
}
</style>
</head>

<body>

<h1 class="hall-title">HALL OF FAME RADAR</h1>

<div id="megaRadar">
    <div class="radar-arm"></div>
</div>

<script src="hall.js"></script>

</body>
</html>
