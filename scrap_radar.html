<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scrap Radar</title>

<style>

body{
    margin:0;
    background:#050505;
    color:#39ff14;
    font-family:Arial,Helvetica,sans-serif;
}

header{
    padding:25px;
    text-align:center;
    font-size:42px;
    font-weight:bold;
}

.panel{
    background:#101010;
    border:1px solid rgba(57,255,20,.35);
    border-radius:18px;
    padding:20px;
    box-shadow:0 0 20px rgba(57,255,20,.08);
}
.dashboard-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
    gap:20px;
    margin:20px;
}

h2{
    margin-top:0;
}
    
</style>

</head>

<body>
<div class="dashboard-grid">

<header>

📡 SCRAP RADAR

</header>

<div class="panel">

<h2>Market Prices</h2>

Waiting for live prices...

</div>

<div class="panel">

<h2>Inventory</h2>

No inventory loaded.

</div>

<div class="panel">

<h2>Nearby Scrap Yards</h2>

Searching...

</div>

<div class="panel">

<h2>Featured Sponsor</h2>

⭐ Your advertisement could be here.

</div>

</body>
</html>
